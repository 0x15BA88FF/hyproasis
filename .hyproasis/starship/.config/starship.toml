format = """
[ ](bg:bright-cyan)$username[пСД](bg:bright-cyan fg:black)$hostname[оВі](fg:bright-cyan) \
[оВґ](fg:bright-blue)$directory[оВі](fg:bright-blue) \
$character \
"""

right_format = """
$git_branch$git_status \
[оВґ](fg:green)$cmd_duration[ ](bg:green)
"""

[username]
disabled = false
show_always = true
format = "[$user ]($style)"
style_user = "fg:black bg:bright-cyan"
style_root = "fg:#f38ba8 bg:bright-cyan"

[hostname]
disabled = false
ssh_only = false
ssh_symbol = "пИО"
format = "[ $hostname]($style)"
style = "fg:black bg:bright-cyan"
trim_at = "."

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)[ пРБ ]($repo_root_style)"
read_only_style = "fg:black bg:red"
repo_root_style = "fg:black bg:bright-blue"
style = "fg:black bg:bright-blue"
truncation_symbol = "вЛѓ"
use_os_path_sep = true
truncation_length = 2
read_only = " вЧИ"

[directory.substitutions]
"~/Documents" = "пЬШ"
"~/Downloads" = "пАЩ"
"~/Pictures" = "пАЊ"
"~/.config" = "пАУ"
"~/Videos" = "пАљ"
"~/Music" = "пАБ"
"~/Dev" = "у∞Еі "

[fill]
symbol = " "

[cmd_duration]
format = '[пАЧ $duration]($style)'
style = "fg:black bg:green"
show_milliseconds = true
min_time = 0

[character]
success_symbol = "[рЯЮИ](fg:#a6e3a1 bold)"
error_symbol = "[рЯЮИ](fr:#f38ba8 bold)"
vicmd_symbol = "[рЯЮИ](fg:#f9e2af bold)"
